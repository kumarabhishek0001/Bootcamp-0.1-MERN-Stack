<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Archives</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="homepage_style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- <script defer src="homepage_Script.js"></script> -->
</head>

<body>

    <div class="show-error">
        <p>Network is busy. Please try again!</p>
    </div>

    <!-- Search Section -->
    <div class="operations">
        <h1>What's your favorite movie</h1>

        <div class="search">
            <input type="text" placeholder="Movie name" id="search-input">
            <button onclick="search()" id="search-button">Find</button>
        </div>
    </div>

    <!-- Movies Grid -->
    <div class="movies-container">

        <!-- Card -->
        <!-- <div class="card">
            <div class="image-container"></div>

            <div class="movie-details">
                <h2>Title</h2>
                <p>Overview</p>
                <p>Release Date</p>
            </div>
        </div> -->
    </div>


    <script>

        function addMovieData(movieData){
            let movieDataArr = movieData.results;
            // console.log(movieDataArr)

            movieDataArr = movieDataArr.filter(movie => movie.original_language === 'en') 

            movieDataArr.forEach(element => {
                const movieDetails = document.createElement('div');
                movieDetails.classList.add('movie-details');

                // creating title and adding text
                const movieDetailsTitle = document.createElement('h2');
                movieDetailsTitle.innerText = element.original_title;

                // creating overview and adding text
                const movieDetailsOverview = document.createElement('p');
                movieDetailsOverview.innerText = element.overview.slice(0,80)

                // creating release and adding text
                const movieDetailsReleaseDate = document.createElement('p');
                movieDetailsReleaseDate.innerText = element.release_date

                // appending in movie details
                movieDetails.appendChild(movieDetailsTitle)
                movieDetails.appendChild(movieDetailsOverview)
                movieDetails.appendChild(movieDetailsReleaseDate)

                

                // creating image container
                const imageContainer = document.createElement('div');
                imageContainer.classList.add('image-container');

                // creating card
                const card = document.createElement('div');
                card.classList.add('card')
                

                
                // appending 
                card.appendChild(imageContainer)
                
                card.appendChild(movieDetails)

                // final append 
                const finalDiv = document.getElementsByClassName('movies-container')[0];
                finalDiv.appendChild(card)


            });

        }

        async function search() {
            const movieName = document.getElementById('search-input').value;

            if (!movieName.trim()) {
                alert("Enter a movie name");
                return;
            }

            try {

                const showError = document.getElementsByClassName('show-error')[0]
                showError.style.display = 'none'

                const response = await axios.get(
                    'http://localhost:3000/getmovie/' + encodeURIComponent(movieName)
                );

                

                addMovieData(response.data);

                // TODO: render movies here

            } catch (err) {
                console.log(err);

                const showError = document.getElementsByClassName('show-error')[0]
                showError.style.display = 'block'
            }
        }


    </script>
</body>

</html>
